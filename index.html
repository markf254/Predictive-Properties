<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predictive Properties | Luxury Home Flipping & Renovations</title>
  <meta name="description" content="Predictive Properties transforms homes with premium house flipping before and after results and expert home renovations [your city]." />
  <meta name="keywords" content="house flipping before and after, home renovations [your city], luxury home remodels, Predictive Properties" />
  <meta name="theme-color" content="#0f0f13" />
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #171821;
      --text: #f3f2ee;
      --muted: #b9b7af;
      --gold: #d4af37;
      --gold-soft: #f4dd9a;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      --radius: 14px;
      --max-width: 1120px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0f0f13 0%, #10121a 55%, #0f0f13 100%);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    h1, h2, h3 {
      font-family: "Playfair Display", Georgia, serif;
      letter-spacing: 0.02em;
      margin-top: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: color 0.28s ease, box-shadow 0.28s ease, transform 0.28s ease;
    }

    .container {
      width: min(92%, var(--max-width));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 99;
      backdrop-filter: blur(8px);
      background: rgba(15, 15, 19, 0.86);
      border-bottom: 1px solid rgba(212, 175, 55, 0.18);
    }

    .nav-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 0;
      gap: 1rem;
    }

    .logo {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold-soft);
    }

    nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    nav a {
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      color: var(--muted);
    }

    nav a:hover,
    nav a:focus-visible {
      color: var(--gold-soft);
      box-shadow: inset 0 -1px 0 var(--gold);
      transform: translateY(-1px);
      outline: none;
    }

    .hero {
      padding: 5rem 0 4rem;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      max-width: 760px;
      margin: 0 auto 1.8rem;
      font-size: 1.05rem;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(212, 175, 55, 0.7);
      box-shadow: var(--shadow);
      font-weight: 600;
    }

    .btn.primary {
      background: linear-gradient(135deg, #c4a035, #e7c86b);
      color: #161616;
    }

    .btn.secondary {
      background: transparent;
      color: var(--gold-soft);
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(212, 175, 55, 0.2);
      outline: none;
    }

    section {
      padding: 3.4rem 0;
    }

    .project-links {
      max-width: 680px;
      margin: 0 auto;
      background: linear-gradient(170deg, #1a1d28, #141620);
      border: 1px solid rgba(212, 175, 55, 0.22);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      box-shadow: var(--shadow);
    }

    .project-links h2 {
      margin-bottom: 0.7rem;
      color: var(--gold-soft);
    }

    .project-links ul {
      margin: 0;
      padding-left: 1.2rem;
    }

    .project-links li {
      margin: 0.45rem 0;
      color: var(--muted);
    }

    .project-links a {
      color: var(--gold-soft);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      text-align: center;
      color: var(--muted);
      padding: 1.6rem 0;
    }

    @media (max-width: 680px) {
      .hero {
        padding-top: 4rem;
      }

      nav {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav-wrap">
      <a class="logo" href="#top">Predictive Properties</a>
      <nav aria-label="Main">
      </nav>
    </div>
  </header>

  <main id="top">
    <section id="projects" class="fade-in">
      <div class="container">
        <div class="project-links">
          <h2>Featured Property Pages</h2>
          <ul>
            <li><a href="elba.html">Elba</a></li>
            <li><a href="5_summit.html">5 Summit</a></li>
            <li><a href="goose_creek.html">Goose Creek</a></li>
            <li><a href="blue_ridge.html">Blue Ridge</a></li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container"></div>
  </footer>

  <script>
    const fadeElements = document.querySelectorAll('.fade-in');
    const fadeObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    fadeElements.forEach((el) => fadeObserver.observe(el));
  </script>
</body>
</html>
